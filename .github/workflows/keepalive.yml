name: Keepalive — Restart Bot if Down

on:
  schedule:
    # Runs every hour — checks if the bot is alive, fires it up if not
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest

    steps:
      - name: Check if bot is running, restart if not
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          RUNNING=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/run-bot.yml/runs?status=in_progress&per_page=5" \
            | python3 -c "import sys,json; data=json.load(sys.stdin); print(data['total_count'])")

          echo "Active bot runs: $RUNNING"

          if [ "$RUNNING" -eq "0" ]; then
            echo "Bot is DOWN — restarting via repository_dispatch..."
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/dispatches" \
              -d '{"event_type":"start-bot"}'
            echo "Restart triggered."
          else
            echo "Bot is running. All good."
          fi
