name: Keepalive — Restart Bot if Down

on:
  schedule:
    # Check every 30 minutes — max downtime is 30 min if self-trigger fails
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest

    steps:
      - name: Restart bot if not running
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          RUNNING=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/run-bot.yml/runs?status=in_progress&per_page=5" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['total_count'])")

          echo "Active bot runs: $RUNNING"

          if [ "$RUNNING" -eq "0" ]; then
            echo "Bot is DOWN — triggering restart..."
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/dispatches" \
              -d '{"event_type":"start-bot"}'
            echo "Restart triggered."
          else
            echo "Bot is alive. Nothing to do."
          fi
