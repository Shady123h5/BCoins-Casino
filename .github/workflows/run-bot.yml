name: BCoins Casino Bot — 24/7 (No-PAT)

on:
  workflow_dispatch:
  schedule:
    # Fires every 5 hours
    - cron: "0 */5 * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build bot
        run: pnpm --filter @workspace/api-server run build

      - name: Run bot with Auto-Discovery
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_SECRET_KEY: ${{ secrets.OWNER_SECRET_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PORT: "8080"
        run: |
          # 1. Automatically find the entry point (index.cjs or index.js in a dist folder)
          BOT_PATH=$(find . -path "*/dist/index.cjs" -o -path "*/dist/index.js" | head -n 1)
          
          if [ -z "$BOT_PATH" ]; then
            echo "!!! ERROR: Could not locate the built bot file. Check your build output."
            exit 1
          fi
          
          echo "==> Found bot executable at: $BOT_PATH"

          # 2. Start the 5-hour loop
          END=$(($(date +%s) + 18600))
          
          while [ "$(date +%s)" -lt "$END" ]; do
            echo "==> [$(date -u)] Starting bot..."
            
            # Run the discovered bot file
            node "$BOT_PATH" || echo "==> Bot exited with error"
            
            REMAINING=$(( END - $(date +%s) ))
            if [ "$REMAINING" -gt 5 ]; then
              echo "==> Restarting in 5 seconds..."
              sleep 5
            fi
          done

      - name: Save bot data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add bcoin-data.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: update bcoin data [skip ci]"
            git push origin main
          fi
