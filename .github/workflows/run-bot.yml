name: BCoins Casino Bot — 24/7 (Final-MJS-Fix)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build bot
        run: pnpm --filter @workspace/api-server run build

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_SECRET_KEY: ${{ secrets.OWNER_SECRET_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PORT: "8080"
        run: |
          # 1. Target the .mjs file discovered in your logs
          BOT_PATH="artifacts/api-server/dist/index.mjs"
          
          if [ ! -f "$BOT_PATH" ]; then
            echo "!!! ERROR: $BOT_PATH does not exist."
            ls -R artifacts/api-server/dist
            exit 1
          fi
          
          echo "==> Found bot executable at: $BOT_PATH"

          # 2. 5-hour 10-minute loop
          END=$(($(date +%s) + 18600))
          
          while [ "$(date +%s)" -lt "$END" ]; do
            echo "==> [$(date -u)] Starting bot..."
            
            # Start the bot. Node handles .mjs files natively.
            node "$BOT_PATH" || echo "==> Bot exited (restarting...)"
            
            REMAINING=$(( END - $(date +%s) ))
            if [ "$REMAINING" -gt 5 ]; then
              echo "==> Restarting in 5 seconds... ($REMAININGs left)"
              sleep 5
            else
              break
            fi
          done

      - name: Save bot data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add bcoin-data.json || true
          git diff --staged --quiet || (git commit -m "chore: update data [skip ci]" && git push origin main)
