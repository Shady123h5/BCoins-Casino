name: BCoins Casino Bot — 24/7

on:
  schedule:
    # Fallback safety net — restarts even if self-trigger somehow fails
    - cron: "0 */5 * * *"
  workflow_dispatch: # manual start from the Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit bcoin-data.json back
      actions: write    # trigger the next run before this one dies

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @workspace/api-server run build

      - name: Run bot (4 h 50 min, then graceful stop)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_SECRET_KEY: ${{ secrets.OWNER_SECRET_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PORT: "8080"
        # timeout exits 124 — treat as success so next steps always run
        run: timeout 17400 node artifacts/api-server/dist/index.cjs || true

      - name: Trigger next run (keeps the bot alive with zero gap)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run run-bot.yml --repo "${{ github.repository }}"

      - name: Persist bot data to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bcoin-data.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: persist bot data [skip ci]"
          git push || true
