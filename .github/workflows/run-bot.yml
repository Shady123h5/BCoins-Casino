name: BCoins Casino Bot — 24/7

on:
  # Triggered by the keepalive watchdog and self-trigger
  repository_dispatch:
    types: [start-bot]
  # Manual start from the Actions tab
  workflow_dispatch:
  # Hard fallback — fires every 6 h even if everything else fails
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout (pulls latest bcoin-data.json)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build bot
        run: pnpm --filter @workspace/api-server run build

      - name: Run bot (5 h 45 min, then stop cleanly)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_SECRET_KEY: ${{ secrets.OWNER_SECRET_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PORT: "8080"
        # timeout exits 124 → || true makes the step pass so data is always saved
        run: timeout 20700 node artifacts/api-server/dist/index.cjs || true

      - name: Self-trigger next run via repository_dispatch
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type":"start-bot"}'
        continue-on-error: true   # keepalive.yml is the real safety net

      - name: Save bot data back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main 2>/dev/null || true
          git add bcoin-data.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: persist bot data [skip ci]"
          git push || true
