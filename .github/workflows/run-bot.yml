name: BCoins Casino Bot — 24/7 (No-PAT)

on:
  workflow_dispatch:
  schedule:
    # Fires every 5 hours. 
    # This ensures a new runner starts before the old one timed out.
    - cron: "0 */5 * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Max GitHub limit
    permissions:
      contents: write # Allows saving bcoin-data.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build bot
        run: pnpm --filter @workspace/api-server run build

      - name: Run bot with overlap window
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_SECRET_KEY: ${{ secrets.OWNER_SECRET_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PORT: "8080"
        run: |
          # Run for 5 hours and 15 minutes (315 minutes).
          # Since the cron fires every 5 hours, there is a 15-minute 
          # period where the new bot and old bot are both running.
          END=$(($(date +%s) + 18900))
          
          while [ "$(date +%s)" -lt "$END" ]; do
            echo "==> Starting bot..."
            node artifacts/api-server/dist/index.cjs || echo "==> Bot crashed"
            
            if [ "$(date +%s)" -lt "$END" ]; then
              echo "==> Restarting in 5s..."
              sleep 5
            fi
          done

      - name: Save bot data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bcoin-data.json || true
          git commit -m "chore: persist bot data [skip ci]" || exit 0
          git push origin main
