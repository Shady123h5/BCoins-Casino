name: BCoins Casino Bot — 24/7

on:
  repository_dispatch:
    types: [start-bot]
  workflow_dispatch:
  schedule:
    # Hard fallback every 6 h — fires even if self-trigger and keepalive both fail
    - cron: "0 */6 * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build bot
        run: pnpm --filter @workspace/api-server run build

      - name: Run bot with auto-restart (5 h 45 min window)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_SECRET_KEY: ${{ secrets.OWNER_SECRET_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PORT: "8080"
        # Restart loop: if the bot crashes for ANY reason it comes back within 5s.
        # The loop exits after 5 h 45 min so the job ends cleanly before GitHub's 6 h limit.
        run: |
          END=$(($(date +%s) + 20700))
          while [ "$(date +%s)" -lt "$END" ]; do
            echo "==> [$(date -u)] Starting bot..."
            node artifacts/api-server/dist/index.cjs || echo "==> Bot exited (code $?)"
            REMAINING=$(( END - $(date +%s) ))
            echo "==> $REMAINING seconds remaining in this window."
            if [ "$REMAINING" -gt 5 ]; then
              echo "==> Restarting in 5 s..."
              sleep 5
            fi
          done
          echo "==> Time window elapsed. Handing off to next run."

      - name: Trigger next run immediately
        continue-on-error: true
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type":"start-bot"}'

      - name: Save bot data to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main 2>/dev/null || true
          git add bcoin-data.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: persist bot data [skip ci]"
          git push || true
